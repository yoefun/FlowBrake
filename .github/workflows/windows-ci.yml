name: Windows CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and package Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        shell: pwsh
        run: cargo fmt --all -- --check

      - name: Run tests
        shell: pwsh
        run: cargo test --workspace

      - name: Run clippy
        shell: pwsh
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build release executable
        shell: pwsh
        run: cargo build -p flowbrake-ui --release

      - name: Package clean zip
        id: package
        shell: pwsh
        run: .\scripts\package-windows.ps1

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlowBrake-windows-x64
          path: |
            ${{ steps.package.outputs.archive_path }}
            ${{ steps.package.outputs.checksum_path }}
          if-no-files-found: error

      - name: Attach release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.archive_path }}
            ${{ steps.package.outputs.checksum_path }}
